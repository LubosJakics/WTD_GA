<div class="form-container"> <form id="formular">
    <h2>Rezervácia stola</h2>

    <label for="meno">Vaše Meno:</label>
    <input type="text" id="meno" placeholder="Meno a priezvisko">
    <span class="chyba" id="chyba-meno"></span>

    <label for="email">Váš E-mail:</label>
    <input type="email" id="email" placeholder="email@priklad.sk">
    <span class="chyba" id="chyba-email"></span>

    <label for="telefon">Váš telefón:</label>
    <input type="tel" id="telefon" placeholder="09XX XXX XXX">
    <span class="chyba" id="chyba-telefon"></span>

    <label for="datum">Dátum (dd.mm.rrrr):</label>
    <input type="text" id="datum" placeholder="31.12.2026">
    <span class="chyba" id="chyba-datum"></span>

    <label for="cas">Čas (hh:mm):</label>
    <input type="text" id="cas" placeholder="14:30">
    <span class="chyba" id="chyba-cas"></span>

        <div class="inline-group">
        <input type="checkbox" id="croissant">
        <label for="croissant">Dal by som si čerstvo upečený croissant</label>
    </div>

    <button type="submit">Odoslať rezerváciu</button>
    <p id="vysledok-form"></p>
</form>
</div>

<script type="text/javascript">
    const form = document.getElementById('formular');

    form.addEventListener('submit', (event) => {
        event.preventDefault();

        const values = {
            meno: document.getElementById('meno').value.trim(),
            email: document.getElementById('email').value.trim(),
            phone: document.getElementById('telefon').value.trim(),
            datum: document.getElementById('datum').value.trim(),
            cas: document.getElementById('cas').value.trim(),
            croissant: document.getElementById('croissant').checked
        };

        let isValid = true;
        document.querySelectorAll('.chyba').forEach(el => el.textContent = "");

        // Overenie datumu (dd.mm.yyyy)
        const dateRegex = /^(0[1-9]|[12][0-9]|3[01])\.(0[1-9]|1[012])\.(19|20)\d\d$/;
        if (!dateRegex.test(values.datum)) {
            document.getElementById('chyba-datum').textContent = "Formát musí byť dd.mm.rrrr (napr. 24.12.2024)";
            isValid = false;
        }

        // Overenie casu (hh:mm)
        const timeRegex = /^([01]?[0-9]|2[0-3]):[0-5][0-9]$/;
        if (!timeRegex.test(values.cas)) {
            document.getElementById('chyba-cas').textContent = "Formát musí byť hh:mm (napr. 14:30)";
            isValid = false;
        }

        // ...overenie - meno
        if (values.meno.length < 3) {
            document.getElementById('chyba-meno').textContent = "Meno je príliš krátke.";
            isValid = false;
        }

        const result = document.getElementById('vysledok-form');
        if (isValid) {
            result.textContent = `Úspešne rezervované na ${values.datum} o ${values.cas}.`;
            result.className = 'ok';
            form.reset();
        } else {
            result.textContent = "Opravte chyby vo formulári.";
            result.className = 'chyba';
        }
    });
</script>
